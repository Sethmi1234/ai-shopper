services:

  mongodb:
    image: mongo:7
    container_name: ai-shopper-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-shopper-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-shopper-backend:latest
    container_name: ai-shopper-backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongodb:27017/ai-shopper
      PORT: 5000
      NODE_ENV: production
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ai-shopper-network

volumes:
  mongodb_data:

networks:
  ai-shopper-network:
    driver: bridge